x-airflow-common: &airflow-common
  build: ./airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    - HOST_HOME=${HOME}
    - SECRET_SPARK=${SECRET_SPARK}
    - SECRET_PRODUCER=${SECRET_PRODUCER}
    - SECRET_AIRFLOW=${SECRET_AIRFLOW}
    - SECRET_ML=${SECRET_ML}
  volumes:
    - airflow-data:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./spark/jobs:/opt/airflow/spark/jobs
    - ~/.aws:/home/airflow/.aws:ro
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    - airflow-init
    - spark-master

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  producer:
    build:
      context: .
      dockerfile: producer/dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_PRODUCER=${SECRET_PRODUCER}
    volumes:
      - ~/.aws:/root/.aws:ro

  producer2:
    build:
      context: .
      dockerfile: producer2/dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_PRODUCER=${SECRET_PRODUCER}
    volumes:
      - ~/.aws:/root/.aws:ro

  consumer-prices:
    build:
      context: .
      dockerfile: consumer/dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_CONSUMER=${SECRET_CONSUMER}
      - KAFKA_TOPIC=crypto-prices
    volumes:
      - ~/.aws:/root/.aws:ro

  consumer-orderbook:
    build:
      context: .
      dockerfile: consumer/dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_CONSUMER=${SECRET_CONSUMER}
      - KAFKA_TOPIC=crypto-orderbook
    volumes:
      - ~/.aws:/root/.aws:ro

  consumer-prices-dlq:
    build:
      context: .
      dockerfile: consumer/dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_CONSUMER=${SECRET_CONSUMER}
      - KAFKA_TOPIC=crypto-prices-dlq
    volumes:
      - ~/.aws:/root/.aws:ro

  consumer-orderbook-dlq:
    build:
      context: .
      dockerfile: consumer/dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_CONSUMER=${SECRET_CONSUMER}
      - KAFKA_TOPIC=crypto-orderbook-dlq
    volumes:
      - ~/.aws:/root/.aws:ro

  spark-master:
    build: ./spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
    volumes:
      - ~/.aws:/root/.aws:ro

  spark-worker:
    build: ./spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=3G
      - SPARK_WORKER_CORES=2
    volumes:
      - ~/.aws:/root/.aws:ro

  spark-worker-2:
    build: ./spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=3G
      - SPARK_WORKER_CORES=2
    volumes:
      - ~/.aws:/root/.aws:ro

  airflow-init:
    build: ./airflow
    entrypoint: /bin/bash
    command: -c "
      airflow db init &&
      airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname Admin --role Admin --email admin@example.com &&
      airflow connections delete spark_default || true &&
      airflow connections add spark_default --conn-type spark --conn-host spark-master --conn-port 7077
      "
    depends_on:
      - spark-master
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    volumes:
      - airflow-data:/opt/airflow
      - ~/.aws:/home/airflow/.aws:ro
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8081:8080"
    command: bash -c "rm -f /opt/airflow/airflow-webserver.pid && airflow webserver"

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler

  predictor:
    build: ./predictor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_SPARK=${SECRET_SPARK}
      - SECRET_PRODUCER=${SECRET_PRODUCER}
    volumes:
      - ~/.aws:/root/.aws:ro

  frontend:
    build: ./frontend
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8502:8502"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  ml:
    build: ./ml
    image: stock-pipeline-ml
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - SECRET_ML=${SECRET_ML}
    volumes:
      - ~/.aws:/root/.aws:ro

volumes:
  kafka-data:
    driver: local
  airflow-data:
    driver: local
